<div class="container">
  <h2 class="mb-4">Categories</h2>

  <div class="row g-4">
    <div class="col-md-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title">{{ editingId ? 'Edit category' : 'New category' }}</h5>
          <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
            <div class="mb-3">
              <label class="form-label">Name *</label>
              <input type="text" class="form-control" formControlName="name"
                     [class.is-invalid]="form.controls.name.invalid && form.controls.name.touched" />
              <div class="invalid-feedback">Name is required.</div>
            </div>
            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea class="form-control" rows="2" formControlName="description"></textarea>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">
                {{ editingId ? 'Update' : 'Create' }}
              </button>
              <button type="button" class="btn btn-secondary" *ngIf="editingId" (click)="cancel()">
                Cancel
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="col-md-7">
      <div class="card shadow-sm">
        <div class="card-body p-0">
          <table class="table mb-0">
            <thead class="table-light">
              <tr>
                <th>Name</th>
                <th>Description</th>
                <th class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let c of categories">
                <td><strong>{{ c.name }}</strong></td>
                <td class="text-muted">{{ c.description }}</td>
                <td class="text-end">
                  <button class="btn btn-sm btn-outline-primary me-1" (click)="edit(c)">Edit</button>
                  <button class="btn btn-sm btn-outline-danger" (click)="remove(c)">Delete</button>
                </td>
              </tr>
              <tr *ngIf="categories.length === 0">
                <td colspan="3" class="text-center text-muted py-4">No categories yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
