<div class="container" style="max-width: 720px;">
  <a routerLink="/products" class="btn btn-link mb-3">← Back</a>
  <div class="card shadow-sm">
    <div class="card-body">
      <h3 class="card-title mb-4">{{ editingId ? 'Edit product' : 'New product' }}</h3>

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="mb-3">
          <label class="form-label">Name *</label>
          <input type="text" class="form-control" formControlName="name"
                 [class.is-invalid]="f.name.invalid && f.name.touched" />
          <div class="invalid-feedback">Name is required (min 2 characters).</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea class="form-control" rows="3" formControlName="description"></textarea>
        </div>

        <div class="row g-3">
          <div class="col-md-6 mb-3">
            <label class="form-label">Price *</label>
            <input type="number" step="0.01" class="form-control" formControlName="price"
                   [class.is-invalid]="f.price.invalid && f.price.touched" />
            <div class="invalid-feedback">Valid price required.</div>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Stock</label>
            <input type="number" class="form-control" formControlName="stock" />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Category *</label>
          <select class="form-select" formControlName="category"
                  [class.is-invalid]="f.category.invalid && f.category.touched">
            <option value="">-- choose a category --</option>
            <option *ngFor="let c of categories" [value]="c._id">{{ c.name }}</option>
          </select>
          <div class="invalid-feedback">Category is required.</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Image</label>
          <input type="file" class="form-control" accept="image/*" (change)="onFileSelected($event)" />
          <img *ngIf="imagePreview" [src]="imagePreview" class="mt-3 rounded"
               style="max-height: 200px;" />
        </div>

        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-primary" [disabled]="submitting">
            {{ editingId ? 'Update' : 'Create' }}
          </button>
          <a routerLink="/products" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
